name: set up timux and codex

on:
  workflow_dispatch:
  push:


jobs:
  setup:
    runs-on: ubuntu-latest
      
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install timux
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: configure timux
        run: |
          cat > ~/.tmux.conf << EOF
          set-option -g history-limit 100000
          set -g mouse on
          EOF

      - name: install node js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install codex cli
        run: |
          npm install -g @openai/codex

      - name: create codex config
        run: |
          mkdir -p ~/.codex
          echo 'openai_base_url = "https://app.dataannotation.tech/api/llm_proxy/openai/v1"' > ~/.codex/config.toml
      - name: instructions
        run: |
          export OPENAI_API_KEY=Q9A4AXWDH3V7K6GWMGWQ7TNW
          mkdir ~/codex-test && cd ~/codex-test && codex 'What is in this folder?'
#          mkdir ~/codex-test && cd ~/codex-test && codex 'What is in this folder?'
