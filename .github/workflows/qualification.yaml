name: set up timux and codex

on:
  workflow_dispatch:
  push:


jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      GEMINI_CLI_TRUST_WORKSPACE: true
      GEMINI_MODEL: gemini-3-pro-preview
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_GEMINI_BASE_URL: https://app.dataannotation.tech/api/llm_proxy/gemini
  
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install timux and other erquired softwares
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux
          sudo apt-get install -y ripgrep
          sudo apt-get install -y ncurses-term

      - name: configure timux
        run: |
          cat > ~/.tmux.conf << EOF
          set-option -g history-limit 100000
          set -g mouse on
          EOF

      - name: install node js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install gemini
        run: |
          npm install -g @google/gemini-cli
          REPO_URL=$(cat url.txt | tr -d '/n/r')
          echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV
          REPO_NAME=$(basename -s .git "$REPO_URL")
          git clone "$REPO_URL" "$REPO_NAME"
          cp -r "$(REPO_NAME)" "$(REPO_NAME)-start"
          tar -cf "$REPO_NAME-start.tar " "$REPO_NAME-start"
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "last 4 characters : ${GEMINI_API_KEY:-4}"
          else
            echo "api key not set"
          fi
          echo "======================="
          python3 run_gemini.py
          sleep 70
          ls 
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add GEMINI.md
          git commit -m "CI: update metadata files [skip ci]" || echo "Nothing to commit"
          git push || echo "Push failed"
          echo "==================="
          cat "$REPO_NAME-start-log.log"
          echo "==================="
          echo "=== Active tmux sessions ==="
          tmux ls

      - name: prepare final artifacts
        run: |
          tar -czf "$REPO_NAME-start-final.tar.gz" "$REPO_NAME-start"
      - name: uploading artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qualifucation_results
          path: |
            "$REPO_NAME-start-log.log"
            "$REPO_NAME-start.tar"
            "$REPO_NAME-start-final.tar.gz"
            "$REPO_NAME-start/"
          retention-days: 30
