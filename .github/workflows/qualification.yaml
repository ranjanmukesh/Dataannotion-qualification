name: set up timux and codex

on:
  workflow_dispatch:
  push:


jobs:
  setup:
    runs-on: ubuntu-latest
      
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install timux
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: configure timux
        run: |
          cat > ~/.tmux.conf << EOF
          set-option -g history-limit 100000
          set -g mouse on
          EOF

      - name: install node js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install codex cli
        run: |
          npm install -g @openai/codex

      - name: create codex config
        run: |
          mkdir -p ~/.codex
          echo 'openai_base_url = "https://app.dataannotation.tech/api/llm_proxy/openai/v1"' > ~/.codex/config.toml
      - name: install gemini
        env:
          GEMINI_CLI_TRUST_WORKSPACE: true
          GEMINI_MODEL: gemini-2.5-flash
        run: |
          npm install -g @google/gemini-cli
          export GEMINI_API_KEY=Q9A4AXWDH3V7K6GWMGWQ7TNW
          export GOOGLE_GEMINI_BASE_URL=https://app.dataannotation.tech/api/llm_proxy/gemini
          git clone https://github.com/rochacbruno/flask-project-template.git my-qual-project
          cp -r my-qual-project my-qual-project-start
          cd my-qual-project-start
          cd ..
          tar -cf my-qual-project-start.tar my-qual-project-start
          gemini --prompt "Implement the improvements to the authentication system right now. 
          Add proper user roles, strengthen password validation, add error handling everywhere, and secure all endpoints. 
          Follow the existing code patterns in the project and make the changes to the files directly." 2>&1 | tee gemini-conversation.log
          echo "======================="
          cat gemini-conversation.log
